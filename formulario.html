<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário - Águia Sistemas</title>
    <link rel="stylesheet" href="formulario.css">
</head>
<body>
    <div class="top-bar">
    </div>


    <h1>Formulário de Registro</h1>
    
    <form id="meuFormulario" 
          action="https://script.google.com/macros/s/AKfycbyJI6Qk2axxdiOhnQC3H4uVBmm-KmbRckIeQj0Qtns_WB8QfFaP9Mez0KxSYVTpYKjtrg/exec" 
          method="POST">

        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" 
               required maxlength="20" 
               placeholder="Digite seu nome"
               pattern="[A-Za-zÀ-ÿ\s]{1,20}" 
               oninput="this.value = this.value.replace(/[^A-Za-zÀ-ÿ\s]/g,'');">

        <label for="peca">Peça (Descrição):</label>
        <input type="text" id="peca" name="peca" 
               placeholder="Preenchido automaticamente"
               readonly>

        <label for="item">Item (Código):</label>
        <input type="number" id="item" name="item" 
               required min="0" max="999999" 
               placeholder="Digite o código do item"
               oninput="if(this.value.length > 6) this.value = this.value.slice(0,6);">

        <label for="quantidade">Quantidade:</label>
        <input type="number" id="quantidade" name="quantidade" 
               required min="0" max="9999" 
               placeholder="Digite a quantidade"
               oninput="if(this.value.length > 4) this.value = this.value.slice(0,4);">

        <label for="estabelecimento">Estabelecimento:</label>
        <select id="estabelecimento" name="estabelecimento" required>
            <option value="">-- Selecione um estabelecimento --</option>
            <option value="WAE">WAE</option>
            <option value="WAM">WAM</option>
            <option value="WAS">WAS</option>
            <option value="WAC">WAC</option>
            <option value="ALD">ALD</option>
        </select>

        <div class="botoes">
            <button type="button" id="salvarBtn" class="btn-salvar">Salvar</button>
            <button type="button" id="enviarBtn" class="btn-enviar">Enviar</button>
        </div>
    </form>

    <!-- Seção de Dados Salvos -->
    <div id="dadosSalvos" class="dados-salvos">
        <h2>Dados Salvos (<span id="contador">0</span>/15)</h2>
        <ul id="listaDados"></ul>
    </div>

    <!-- Mensagem de Status -->
    <div class="mensagem" id="mensagem"></div>

    <script src="formulario.js"></script>
</body>
</html>
