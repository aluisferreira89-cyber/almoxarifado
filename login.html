<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endereços - Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #0f0f0f, #1a1a1a, #00c3ff, #0099cc, #00ffcc);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 15px #00c3ff, 2px 2px 6px black;
            font-size: 42px;
            animation: glow 3s infinite alternate;
        }
        @keyframes glow {
            from { text-shadow: 0 0 10px #00c3ff, 2px 2px 6px black; }
            to { text-shadow: 0 0 25px #00ffcc, 2px 2px 10px black; }
        }
        .login-box {
            max-width: 400px;
            width: 100%;
            background: rgba(0,0,0,0.7);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,255,255,0.6);
            backdrop-filter: blur(6px);
            z-index: 2;
        }
        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }
        .senha-container {
            display: flex;
            align-items: center;
        }
        input {
            flex: 1;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .toggle-senha {
            margin-left: 5px;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 20px;
            color: #00ffcc;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border-radius: 5px;
            background: linear-gradient(90deg, #00c3ff, #00ffcc);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
            background: linear-gradient(90deg, #00ffcc, #00c3ff);
        }
        .mensagem {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
            color: #ffcc00;
        }
        .logo {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 350px;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(0,255,255,0.8));
            z-index: 1;
        }
    </style>
</head>
<body>
    <img src="https://intralogexpo.com.br/wp-content/webp-express/webp-images/uploads/2024/02/INTRALOG-LOGOS.png.webp" 
         alt="Logo Intralog" class="logo">

    <div class="login-box">
        <h1>Endereços</h1>
        <form id="loginForm">
            <label for="usuario">Usuário:</label>
            <input type="text" id="usuario" name="usuario" required>

            <label for="senha">Senha:</label>
            <div class="senha-container">
                <input type="password" id="senha" name="senha" required>
                <button type="button" class="toggle-senha" onclick="toggleSenha()">
                    <span id="iconeOlho">👁️</span>
                </button>
            </div>

            <button type="submit">Entrar</button>
        </form>
        <div class="mensagem" id="mensagem"></div>
    </div>

   <script>
    const form = document.getElementById("loginForm");
    const mensagem = document.getElementById("mensagem");
    const senhaInput = document.getElementById("senha");
    const iconeOlho = document.getElementById("iconeOlho");

    const usuariosValidos = {
        "Andre": "123",
        "Anaclaudia": "Aguia2027",
        "ekingerski": "Aguia2026",
        "jrsantos": "Aguia2028"
    };

    function toggleSenha() {
        if (senhaInput.type === "password") {
            senhaInput.type = "text";
            iconeOlho.textContent = "🙈";
        } else {
            senhaInput.type = "password";
            iconeOlho.textContent = "👁️";
        }
    }

    form.addEventListener("submit", function(e) {
        e.preventDefault();
        const usuario = document.getElementById("usuario").value.trim();
        const senha = senhaInput.value.trim();

        if (usuariosValidos[usuario] && usuariosValidos[usuario] === senha) {
            mensagem.textContent = "✅ Login realizado com sucesso!";
            window.location.href = "endereços.html";
        } else {
            mensagem.textContent = "❌ Usuário ou senha incorretos.";
        }
    });
</script>

</body>
</html>
